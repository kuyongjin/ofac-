name: Daily OFAC Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install pandas requests

      - name: Run
        run: |
          wget https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN_ADVANCED.ZIP
          unzip -o SDN_ADVANCED.ZIP
          python generate_ofac.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # [수정됨] 날짜가 붙은 csv 파일을 모두 찾아서 추가
          git add ofac_sanctioned_addresses_*.csv 
          
          # [수정됨] 커밋 메시지에도 날짜 추가 (선택사항)
          git commit -m "Update list $(date +'%Y%m%d')" || exit 0
          git push origin main --force
